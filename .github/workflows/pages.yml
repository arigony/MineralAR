name: Publish GitHub Pages branch

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-publish
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare static site
        run: |
          rm -rf /tmp/mineralar-site
          mkdir -p /tmp/mineralar-site
          cp index.html style.css .nojekyll /tmp/mineralar-site/
          cp -R src /tmp/mineralar-site/

      - name: Publish to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan pages-build
          git rm -rf .
          cp -R /tmp/mineralar-site/. .
          git add -A
          git commit -m "Deploy MineralAR ${GITHUB_SHA}"
          git push --force origin HEAD:gh-pages
