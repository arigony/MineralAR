name: Quality

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm run check
      - run: npm test
      - run: npm run smoke:remote
      - name: Verify deployed MineralAR page
        run: |
          for attempt in {1..12}; do
            if curl -fsSL --max-time 20 https://arigony.github.io/MineralAR/ | grep -q "MineralAR"; then
              echo "MineralAR GitHub Pages is live"
              exit 0
            fi
            echo "Attempt $attempt: page not ready yet"
            sleep 10
          done
          echo "MineralAR GitHub Pages did not become available"
          exit 1
